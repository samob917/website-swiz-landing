<svg xmlns="http://www.w3.org/2000/svg" width="560" height="396" viewBox="0 0 560 396" fill="none">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap');
      .sans { font-family: 'Inter', system-ui, sans-serif; }

      @keyframes spin { to { transform: rotate(360deg); } }
      .engine-spin {
        animation: spin 4s linear infinite;
        transform-box: fill-box;
        transform-origin: center;
      }

      @keyframes ring-pulse {
        0%, 100% { opacity: 0.45; }
        50%      { opacity: 0.85; }
      }
      .ring-pulse { animation: ring-pulse 3s ease-in-out infinite; }

      @keyframes opt-pulse {
        0%, 100% { opacity: 0.55; }
        50%      { opacity: 1; }
      }
      .opt-cap { animation: opt-pulse 2.4s ease-in-out infinite; }

      @keyframes badge-soft {
        0%, 100% { opacity: 0.92; }
        50%      { opacity: 1; }
      }
      .xlsx-soft { animation: badge-soft 4s ease-in-out infinite; }
    </style>

    <filter id="card-shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.03"/>
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.04"/>
    </filter>

    <filter id="badge-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.05"/>
    </filter>
  </defs>

  <!-- Card -->
  <g transform="translate(20, 20)">
    <rect width="520" height="356" rx="20" fill="white" filter="url(#card-shadow)"/>

    <!-- Header row: title + DONE-FOR-YOU on left, schedule.xlsx pill on right -->
    <text x="32" y="42" class="sans" font-size="14" font-weight="700" fill="#1a1a1a">Managed Service</text>
    <g transform="translate(160, 28)">
      <rect width="100" height="20" rx="10" fill="#FEF3C7"/>
      <text x="50" y="14" text-anchor="middle" class="sans" font-size="9" font-weight="700" fill="#92400e" letter-spacing="0.10em">DONE-FOR-YOU</text>
    </g>

    <!-- schedule.xlsx pill, top-right corner, aligned with header -->
    <g transform="translate(356, 24)" filter="url(#badge-shadow)">
      <g class="xlsx-soft">
        <rect width="132" height="28" rx="14" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
        <circle cx="16" cy="14" r="7.5" fill="#16a34a"/>
        <path d="M 12.5 14 L 14.8 16.3 L 19 12" stroke="#ffffff" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <text x="30" y="18" class="sans" font-size="11" font-weight="600" fill="#1a1a1a">schedule.</text>
        <text x="84" y="18" class="sans" font-size="11" font-weight="700" fill="#92400e">xlsx</text>
        <circle cx="118" cy="14" r="3" fill="#fbbf24"/>
      </g>
    </g>

    <!-- LEFT: CONSTRAINTS -->
    <text x="32" y="80" class="sans" font-size="10" font-weight="600" fill="#9ca3af" letter-spacing="0.10em">CONSTRAINTS</text>
    <rect x="28" y="90" width="200" height="148" rx="12" fill="#fafaf9"/>

    <g transform="translate(40, 102)">
      <rect width="176" height="26" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
      <circle cx="13" cy="13" r="3" fill="#1a1a1a"/>
      <text x="24" y="17" class="sans" font-size="11" font-weight="500" fill="#1a1a1a">PGY-1 cap: 80h</text>
    </g>
    <g transform="translate(40, 134)">
      <rect width="176" height="26" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
      <circle cx="13" cy="13" r="3" fill="#1a1a1a"/>
      <text x="24" y="17" class="sans" font-size="11" font-weight="500" fill="#1a1a1a">Weekend rotation</text>
    </g>
    <g transform="translate(40, 166)">
      <rect width="176" height="26" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
      <circle cx="13" cy="13" r="3" fill="#1a1a1a"/>
      <text x="24" y="17" class="sans" font-size="11" font-weight="500" fill="#1a1a1a">Cardiology block: 4w</text>
    </g>
    <g transform="translate(40, 198)">
      <rect width="176" height="26" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
      <circle cx="13" cy="13" r="3" fill="#1a1a1a"/>
      <text x="24" y="17" class="sans" font-size="11" font-weight="500" fill="#1a1a1a">Conference: Sep 12-14</text>
    </g>

    <!-- RIGHT: SCHEDULE -->
    <text x="296" y="80" class="sans" font-size="10" font-weight="600" fill="#9ca3af" letter-spacing="0.10em">SCHEDULE</text>
    <rect x="292" y="90" width="200" height="148" rx="12" fill="#fafaf9"/>

    <g transform="translate(304, 102)">
      <rect width="176" height="22" rx="5" fill="#f3f4f6"/>
      <text x="10" y="15" class="sans" font-size="10" font-weight="700" fill="#6b7280">Resident</text>
      <text x="80" y="15" class="sans" font-size="10" font-weight="700" fill="#6b7280">Jul</text>
      <text x="112" y="15" class="sans" font-size="10" font-weight="700" fill="#6b7280">Aug</text>
      <text x="146" y="15" class="sans" font-size="10" font-weight="700" fill="#6b7280">Sep</text>
    </g>

    <g transform="translate(304, 132)">
      <text x="10" y="13" class="sans" font-size="11" font-weight="600" fill="#1a1a1a">Smith</text>
      <text x="80" y="13" class="sans" font-size="11" font-weight="500" fill="#1a1a1a">Card</text>
      <text x="112" y="13" class="sans" font-size="11" font-weight="500" fill="#1a1a1a">MICU</text>
      <text x="146" y="13" class="sans" font-size="11" font-weight="500" fill="#1a1a1a">Amb</text>
      <line x1="0" y1="22" x2="176" y2="22" stroke="#e5e7eb" stroke-width="0.75"/>
    </g>

    <g transform="translate(304, 160)">
      <text x="10" y="13" class="sans" font-size="11" font-weight="600" fill="#1a1a1a">Patel</text>
      <text x="80" y="13" class="sans" font-size="11" font-weight="500" fill="#1a1a1a">MICU</text>
      <text x="112" y="13" class="sans" font-size="11" font-weight="500" fill="#1a1a1a">Card</text>
      <text x="146" y="13" class="sans" font-size="11" font-weight="500" fill="#1a1a1a">Elec</text>
      <line x1="0" y1="22" x2="176" y2="22" stroke="#e5e7eb" stroke-width="0.75"/>
    </g>

    <g transform="translate(304, 188)">
      <text x="10" y="13" class="sans" font-size="11" font-weight="600" fill="#1a1a1a">Lin</text>
      <text x="80" y="13" class="sans" font-size="11" font-weight="500" fill="#1a1a1a">Elec</text>
      <text x="112" y="13" class="sans" font-size="11" font-weight="500" fill="#1a1a1a">Amb</text>
      <text x="146" y="13" class="sans" font-size="11" font-weight="500" fill="#1a1a1a">Card</text>
    </g>

    <!-- CENTER: ENGINE between columns -->
    <g transform="translate(260, 164)">
      <circle class="ring-pulse" cx="0" cy="0" r="26" fill="#FEF3C7"/>
      <circle cx="0" cy="0" r="18" fill="#FDE68A"/>
      <!-- Two straight arrows pointing opposite directions (swap icon), rotating -->
      <g class="engine-spin">
        <!-- Top arrow: pointing right -->
        <line x1="-9" y1="-4" x2="9" y2="-4"
              stroke="#92400e" stroke-width="1.8" stroke-linecap="round"/>
        <polyline points="5,-7.5 9,-4 5,-0.5"
                  stroke="#92400e" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <!-- Bottom arrow: pointing left -->
        <line x1="9" y1="4" x2="-9" y2="4"
              stroke="#92400e" stroke-width="1.8" stroke-linecap="round"/>
        <polyline points="-5,7.5 -9,4 -5,0.5"
                  stroke="#92400e" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </g>
    </g>

    <!-- Connector dashes between center engine and the boxes -->
    <line x1="232" y1="164" x2="240" y2="164" stroke="#e5e7eb" stroke-width="1.5" stroke-dasharray="2 3"/>
    <line x1="280" y1="164" x2="288" y2="164" stroke="#e5e7eb" stroke-width="1.5" stroke-dasharray="2 3"/>

    <!-- Engine label BELOW both boxes, centered, full width available -->
    <text x="260" y="262" text-anchor="middle" class="sans" font-size="11" font-weight="600" fill="#1a1a1a">Scheduling Wizard</text>
    <text x="260" y="278" text-anchor="middle" class="sans opt-cap" font-size="10" font-weight="500" fill="#6b7280">Optimizing…</text>

    <!-- FOOTER -->
    <line x1="28" y1="306" x2="492" y2="306" stroke="#f3f4f6"/>

    <g transform="translate(32, 322)">
      <circle cx="6" cy="10" r="2.5" fill="#fbbf24"/>
      <text x="16" y="14" class="sans" font-size="11" font-weight="600" fill="#1a1a1a">Submit constraints</text>
    </g>
    <g transform="translate(186, 322)">
      <circle cx="6" cy="10" r="2.5" fill="#fbbf24"/>
      <text x="16" y="14" class="sans" font-size="11" font-weight="600" fill="#1a1a1a">Receive Excel schedule</text>
    </g>
    <g transform="translate(360, 322)">
      <circle cx="6" cy="10" r="2.5" fill="#fbbf24"/>
      <text x="16" y="14" class="sans" font-size="11" font-weight="600" fill="#1a1a1a">No software to learn</text>
    </g>

  </g>
</svg>
